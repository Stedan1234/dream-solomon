<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamWise — Where dreams find their meaning</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="/dreamwise-icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <div class="header-inner">
                <img src="/dreamwise-logo.svg" class="logo" alt="DreamWise owl logo">
                <h1>DreamWise</h1>
            </div>
            <p class="subtitle">Where dreams find their meaning</p>
        </header>

        <section class="add-dream">
            <h2>Tell me your dream</h2>
            <form id="dreamForm">
                <textarea
                    id="dreamText"
                    placeholder="Describe your dream in detail..."
                    rows="6"
                    required
                ></textarea>
                <button type="submit" id="submitBtn">
                    <span class="btn-text">Seek understanding</span>
                    <span class="btn-loading" style="display: none;">Listening...</span>
                </button>
            </form>
        </section>

        <section class="dreams-list">
            <h2>Your dream journal</h2>
            <div id="dreamsContainer">
                <p class="loading">Gathering your dreams...</p>
            </div>
        </section>
    </div>
    <footer>
        <p>&copy; DreamWise. All rights reserved.</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
